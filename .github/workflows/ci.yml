name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Rundung, Compliance und Abrechnung sind zeitzonenabhängig — der Testlauf
  # fixiert die Zone, damit Tagesgrenzen deterministisch sind.
  TZ: Europe/Berlin

jobs:
  # Kern: gemeinsame Business-Logik + Datenmodell + Web + Mobile (Typen).
  node:
    name: build, test, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (core, db, web, desktop-frontend)
        run: pnpm -r build
      - name: Unit-Tests (core 98, web 45)
        run: pnpm -r test
      - name: Typecheck iOS-App
        run: pnpm --filter @ptl/mobile exec tsc --noEmit

  # Lokaler Desktop-Modus: rusqlite-Backend headless gegen eine Wegwerf-DB.
  desktop:
    name: desktop (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri-Systemabhängigkeiten
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Integrationstests (Timer, Single-Timer-Invariante, Nachtrag, Backup)
        working-directory: apps/desktop/src-tauri
        run: cargo test --test local_mode

  # Server-Modus end-to-end: Migration → REST → WebSocket → Rechnung → Sync.
  smoke:
    name: smoke (server end-to-end)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ptl
          POSTGRES_PASSWORD: ptl
          POSTGRES_DB: ptl
        ports: ["5442:5432"]
        options: >-
          --health-cmd "pg_isready -U ptl -d ptl"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://ptl:ptl@localhost:5442/ptl
      SESSION_SECRET: ci-secret-0123456789abcdef0123456789abcdef
      SKIP_DB: "1" # Postgres stellt der Service-Container bereit
      PORT: "3099"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Web bauen (server.mjs braucht .next)
        run: pnpm --filter @ptl/web build
      - name: Smoke — 20 Invarianten (Rundung, Compliance, PDF, Rechnung, Sync, WS)
        run: bash scripts/smoke.sh
