name: Release

# Auslöser: ein Versions-Tag wie v0.0.1. Erzeugt das Container-Image (GHCR),
# die Desktop-Bundles (macOS + Windows) und einen GitHub Release mit Artefakten.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version-Tag (z. B. v0.0.1)"
        required: true

permissions:
  contents: write # GitHub Release anlegen
  packages: write # Image nach GHCR pushen

env:
  IMAGE: ghcr.io/jure-tarle/tarlog-web

jobs:
  # 1) Vor dem Release müssen alle Prüfungen halten.
  verify:
    uses: ./.github/workflows/ci.yml

  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Tag und Manifest-Version abgleichen
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node scripts/verify-version.mjs "$RELEASE_TAG"

  # 2) Server-Image für linux/amd64 + linux/arm64 nach GHCR.
  image:
    needs: [verify, version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version aus dem Tag ableiten
        id: v
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.v.outputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.v.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true

  # 3) Desktop-Bundles: macOS (dmg/app) und Windows (nsis/msi). Ungesigniert;
  #    Signing-Secrets können später ergänzt werden (siehe tauri-action-Doku).
  #
  #    Desktop-Bundles werden erst nach Versions- und vollständigem CI-Gate
  #    erzeugt. Der lokale Desktop-Modus wird zusätzlich vor dem Bundling
  #    erneut gegen die native Rust-/SQLite-Schicht geprüft.
  desktop:
    needs: [verify, version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: pnpm install --frozen-lockfile
      # Core wird vom Desktop-Frontend importiert und muss gebaut vorliegen.
      - run: pnpm --filter @tarlog/core build && pnpm --filter @tarlog/db build
      # Desktop-eigenes Gate: der headless Integrationstest des lokalen Modus
      # (Migration, Timer, Single-Timer, Nachtrag, Backup). Fängt Startup- und
      # Persistenzfehler VOR dem Bundling.
      - name: Desktop-Rusttests
        working-directory: apps/desktop/src-tauri
        run: cargo test --all-targets
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Tarlog ${{ inputs.tag || github.ref_name }}"
          releaseBody: "Automatisch erzeugte Bundles. Änderungen: siehe CHANGELOG.md. Desktop-Bundles sind unsigniert."
          releaseDraft: true
          prerelease: false
