# docker-compose.image.yml — Betrieb aus dem veröffentlichten GHCR-Image, ohne
# lokalen Build. Für Nutzer, die nur deployen wollen.
#
#   cp .env.example .env   # Werte anpassen (SESSION_SECRET, Passwörter!)
#   docker compose -f docker-compose.yml -f docker-compose.image.yml up -d
#
# Legt `build:` des web-Dienstes still und zieht stattdessen das Release-Image.
# Version über PTL_VERSION (Default: latest), z. B. PTL_VERSION=0.0.2.

services:
  web:
    build: !reset null
    image: ghcr.io/jure-tarle/tarlog-web:${PTL_VERSION:-latest}
