# docker-compose.yml — Tarlog, selbst gehosteter Server-Modus.
# doc 05 §9.1 (Docker Compose), §9.2 (Env), §9.4 (Health-Check).
#
# Ein Kommando startet den vollständigen Stack:
#   cp .env.example .env   # Werte anpassen (mind. SESSION_SECRET!)
#   docker compose up -d --build
#
# Dienste: web (Next.js standalone + WS), postgres:17 (persistent), redis
# (optional, für Hintergrundjobs — auskommentiert). Zeiten sind epoch-ms UTC,
# Geld Integer-Cents; keine Secrets in Logs (doc 09).

name: project-time-ledger

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ptl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ptl}
      POSTGRES_DB: ${POSTGRES_DB:-ptl}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # web wartet via depends_on auf diesen Zustand, bevor Migrationen laufen.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ptl} -d ${POSTGRES_DB:-ptl}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Standardmäßig nicht nach außen exponiert. Für externe Backups/Tools:
    # ports:
    #   - "5432:5432"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    # tini als PID 1 (Signale/Zombie-Reaping) ohne Extra-Paket im Image.
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Container-interner Host `postgres` (Compose-DNS). doc 05 §9.2.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-ptl}:${POSTGRES_PASSWORD:-ptl}@postgres:5432/${POSTGRES_DB:-ptl}}
      # Pflicht: langer Zufallswert. Ohne Wert schlägt `up` bewusst fehl.
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET erforderlich — in .env setzen}
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.0.3}
      TARLOG_TRUST_PROXY: ${TARLOG_TRUST_PROXY:-0}
      # Optionaler Redis-Job-Kanal (siehe redis-Dienst unten):
      # REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      # Host-Port == Container-Port (server.mjs lauscht auf PORT). Beim Ändern
      # von PORT bleiben beide Seiten konsistent.
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    # Healthcheck ist im Dockerfile definiert (GET /api/health).

  # ---------------------------------------------------------------------------
  # Optional: Redis für Hintergrundjobs (Exporte, Rechnungen, Sync-Wartung).
  # doc 05 §9.1 (optional). Aktivieren: Block einkommentieren, REDIS_URL in `web`
  # setzen und `redisdata` unter volumes freigeben.
  # ---------------------------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   command: ["redis-server", "--appendonly", "yes"]
  #   volumes:
  #     - redisdata:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  pgdata:
  # redisdata:
