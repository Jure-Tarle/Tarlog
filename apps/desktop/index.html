<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("tarlog-theme");
          const theme = stored === "light" || stored === "dark"
            ? stored
            : (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (_) {}
      })();
    </script>
    <title>Tarlog</title>
  </head>
  <body>
    <!--
      Liquid-glass refraction filter. Referenced by translucent controls via
      backdrop-filter: url(#liquid-glass-refraction) to bend (lens) the content
      behind them instead of only blurring it. Low-frequency fractal noise, so
      the warp reads as smooth glass rather than ripples. Purely additive: if
      the WebView does not support SVG filters in backdrop-filter, controls fall
      back to their plain blur material with no visual breakage.
    -->
    <svg width="0" height="0" aria-hidden="true" style="position:absolute;pointer-events:none">
      <filter id="liquid-glass-refraction" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.009 0.009" numOctaves="2" seed="6" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2.4" result="softNoise" />
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="16" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="root"></div>
    <script>
      (() => {
        const showFatal = (message) => {
          const root = document.getElementById("root");
          if (!root || root.childElementCount) return;
          root.innerHTML = `<main style="font:14px -apple-system,BlinkMacSystemFont,sans-serif;padding:32px;color:CanvasText;background:Canvas;min-height:100vh"><h1 style="font-size:20px">Tarlog konnte nicht gestartet werden</h1><p style="color:GrayText">${String(message).replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}</p></main>`;
        };
        window.addEventListener("error", (event) => showFatal(event.message));
        window.addEventListener("unhandledrejection", (event) => showFatal(event.reason?.message || event.reason));
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
