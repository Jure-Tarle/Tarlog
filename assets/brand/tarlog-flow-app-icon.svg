<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Tarlog Flow App Icon</title>
  <desc id="desc">An unmasked, full-bleed blue app-icon master with a white open time dial and forward-facing clock hand.</desc>
  <defs>
    <linearGradient id="flow-background" x1="112" y1="80" x2="912" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#68B9FF"/>
      <stop offset="0.48" stop-color="#1478F2"/>
      <stop offset="1" stop-color="#173FB7"/>
    </linearGradient>
  </defs>

  <g id="background">
    <rect width="1024" height="1024" fill="url(#flow-background)"/>
  </g>

  <g id="dial" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <path d="M717 655A250 250 0 1 1 717 369" stroke-width="88"/>
  </g>

  <g id="hand" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <path d="M443 386L512 512L665 443" stroke-width="82"/>
  </g>
</svg>
